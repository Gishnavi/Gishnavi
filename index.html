<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Gishnavi Kolli — developer portfolio: projects, skills, and contact."
    />
    <title>Gishnavi Kolli · Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Syne:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <header class="site-header">
      <a class="logo" href="#">GK</a>
      <nav class="nav" aria-label="Primary">
        <a href="#work">Work</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
      <button
        type="button"
        class="theme-toggle"
        aria-label="Toggle color theme"
        data-theme-toggle
      >
        <span class="theme-toggle__icon" aria-hidden="true"></span>
      </button>
    </header>

    <main>
      <section class="hero" id="top">
        <div class="hero__glow hero__glow--one" aria-hidden="true"></div>
        <div class="hero__glow hero__glow--two" aria-hidden="true"></div>
        <p class="eyebrow" data-reveal>Available for collaborations</p>
        <h1 class="hero__title" data-reveal>
          <span class="hero__name">Gishnavi Kolli</span>
          <span class="hero__line">I build thoughtful interfaces &amp; reliable systems.</span>
        </h1>
        <p class="hero__lede" data-reveal>
          Full-stack leaning engineer focused on clarity, performance, and craft. Based on
          curiosity and shipped code.
        </p>
        <div class="hero__actions" data-reveal>
          <a class="btn btn--primary" href="#work">View projects</a>
          <a class="btn btn--ghost" href="https://github.com/gishnavikolli" rel="noopener noreferrer"
            >GitHub</a
          >
        </div>
      </section>

    </main>
    <footer class="site-footer">
      <p>© 2026 Gishnavi Kolli.</p>
      <a href="#top" class="footer__top">Back to top ↑</a>
    </footer>
  </body>
</html>
